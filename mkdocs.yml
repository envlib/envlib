site_name: envlib
site_description: The environmental library

repo_url: https://github.com/envlib/envlib
repo_name: envlib/envlib

theme:
    name: material
    icon:
        logo: material/library
    palette:
        # Palette toggle for light mode
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: light green
          accent: amber
          toggle:
            icon: material/brightness-7
            name: Switch to dark mode

        # Palette toggle for dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: light green
          accent: amber
          toggle:
            icon: material/brightness-4
            name: Switch to light mode

markdown_extensions:
    - admonition
    - toc:
        permalink: true
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.tasklist:
        custom_checkbox: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences

plugins:
    - search
    - mkdocstrings:
        handlers:
            python:
                paths: [.]
                inventories:
                    - https://docs.python.org/3.10/objects.inv
                options:
                    docstring_style: google

watch:
    - docs
    - envlib

nav:
    - Home: index.md
    - Getting Started:
        - Installation: getting-started/installation.md
        - Quick Start: getting-started/quickstart.md
    - Concepts:
        - The Data Model: concepts/data-model.md
    - User Guide:
        - Browsing & Querying: guide/browsing-querying.md
        - Opening Data: guide/opening-data.md
        - Producing Datasets: guide/producing-datasets.md
        - Publishing & Registration: guide/publishing.md
        - Vocabularies: guide/vocabularies.md
        - Migrating from tethys: guide/tethys-migration.md
    - Reference:
        - Catalogue: reference/catalogue.md
        - Metadata: reference/metadata.md
        - Vocabularies: reference/vocabularies.md
    - Changelog: changelog.md
